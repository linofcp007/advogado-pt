# Servidor MCP advogado-pt para o Codex CLi (OpenAI).
# Cola este bloco no teu ~/.codex/config.toml
#
# Compila primeiro o servidor (npm install && npm run build em mcp-server/)
# e usa o caminho ABSOLUTO para dist/index.js:
[mcp_servers.advogado-pt]
command = "node"
args = ["/ABSOLUTE/PATH/TO/advogado-pt/mcp-server/dist/index.js"]

# Dica: corre `node bin/advogado-pt.mjs mcp-config codex` na raiz do repo
# para gerar este bloco com o caminho ABSOLUTO já preenchido para a tua máquina.
